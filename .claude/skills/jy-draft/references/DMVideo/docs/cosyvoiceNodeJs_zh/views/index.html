<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CosyVoice流式语音合成</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --warning: #ffb86c;
            --error: #ff5555;
            --dark: #1e1e2e;
            --darker: #121220;
            --light: #f8f9fa;
            --gray: #6c757d;
            --accent: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--darker), var(--dark));
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: rgba(30, 30, 46, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: 1fr 350px;
            position: relative;
            z-index: 1;
        }

        .background-decor {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(67, 97, 238, 0.1), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(76, 201, 240, 0.1), transparent 40%);
            z-index: -1;
        }

        header {
            grid-column: 1 / -1;
            background: rgba(67, 97, 238, 0.2);
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(76, 201, 240, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        header h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        header p {
            color: var(--gray);
            font-size: 1.1rem;
        }

        .main-content {
            padding: 30px;
        }

        .input-section {
            margin-bottom: 30px;
            position: relative;
        }

        .input-section label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: var(--success);
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--light);
            font-size: 1rem;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 150px;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -100%;
            left: -100%;
            width: 200%;
            height: 200%;
            background: linear-gradient(rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.3s;
        }

        .btn:hover::after {
            top: 0;
            left: 0;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--light);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-warning {
            background: rgba(255, 184, 108, 0.2);
            color: var(--light);
        }

        .btn-warning:hover {
            background: rgba(255, 184, 108, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .visualizer {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .wave {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 100px;
            width: 100%;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .bar {
            flex: 1;
            max-width: 8px;
            background: var(--success);
            border-radius: 3px;
            height: 20px;
            animation: wave 1.2s infinite ease-in-out;
        }

        .bar:nth-child(2) {
            animation-delay: 0.1s;
            height: 40px;
        }

        .bar:nth-child(3) {
            animation-delay: 0.2s;
            height: 70px;
        }

        .bar:nth-child(4) {
            animation-delay: 0.3s;
            height: 90px;
        }

        .bar:nth-child(5) {
            animation-delay: 0.4s;
            height: 100px;
        }

        .bar:nth-child(6) {
            animation-delay: 0.5s;
            height: 90px;
        }

        .bar:nth-child(7) {
            animation-delay: 0.6s;
            height: 70px;
        }

        .bar:nth-child(8) {
            animation-delay: 0.7s;
            height: 40px;
        }

        .bar:nth-child(9) {
            animation-delay: 0.8s;
            height: 20px;
        }

        @keyframes wave {

            0%,
            100% {
                transform: scaleY(0.8);
            }

            50% {
                transform: scaleY(1.5);
            }
        }

        .status {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .status h3 {
            margin-bottom: 15px;
            color: var(--success);
        }

        .status-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-label {
            font-size: 0.95rem;
        }

        .status-value {
            font-weight: 700;
            color: var(--success);
        }

        .progress-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .progress-section h3 {
            margin-bottom: 15px;
            color: var(--success);
        }

        .progress-container {
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            border-radius: 5px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--gray);
            margin-top: 10px;
        }

        .playback-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .playback-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--light);
        }

        .playback-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .playback-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .sidebar {
            background: rgba(30, 30, 46, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .history-section {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .history-section h3 {
            color: var(--success);
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
            max-height: 250px;
        }

        .history-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .history-item:hover {
            background: rgba(67, 97, 238, 0.2);
            transform: translateX(5px);
        }

        .history-text {
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .history-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--gray);
        }

        .history-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ff5555;
            background: none;
            border: none;
            cursor: pointer;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .history-delete:hover {
            background: rgba(255, 85, 85, 0.3);
        }

        .history-empty {
            text-align: center;
            color: var(--gray);
            padding: 20px;
        }

        footer {
            grid-column: 1 / -1;
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--gray);
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-info {
            display: flex;
            gap: 15px;
        }

        .voice-select {
            width: 100%;
            padding: 10px 15px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: var(--light);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .voice-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .voice-info {
            font-size: 0.85rem;
            color: var(--gray);
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .voice-info h4 {
            color: var(--success);
            margin-bottom: 5px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }

            .controls {
                flex-direction: column;
            }

            footer {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="background-decor"></div>

        <header>
            <h1><i class="fas fa-microphone-alt"></i> CosyVoice流式语音合成</h1>
            <p>支持实时流式播放 - 合成过程中也可随时播放</p>
        </header>

        <div class="main-content">
            <div class="input-section">
                <label for="text-input"><i class="fas fa-keyboard"></i> 输入要转换为语音的文本：</label>
                <textarea id="text-input"
                    placeholder="请输入您要转换为语音的内容...">你好，这是一个基于阿里云 CosyVoice 技术的文本转语音演示，请选择您喜欢的音色进行合成。支持实时流式播放，无需等待合成完成即可听到语音。</textarea>
            </div>

            <div class="controls">
                <button id="synthesize-btn" class="btn btn-primary">
                    <i class="fas fa-wave-square"></i> 合成语音
                </button>
                <button id="play-btn" class="btn btn-secondary" disabled>
                    <i class="fas fa-play"></i> 播放
                </button>
                <button id="pause-btn" class="btn btn-warning" disabled>
                    <i class="fas fa-pause"></i> 暂停
                </button>
                <button id="stop-btn" class="btn btn-secondary" disabled>
                    <i class="fas fa-stop"></i> 停止
                </button>
            </div>

            <div class="visualizer">
                <div class="wave">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>

            <div class="status">
                <h3><i class="fas fa-info-circle"></i> 状态</h3>
                <div class="status-info">
                    <div class="status-item">
                        <span class="status-label">连接状态：</span>
                        <span id="connection-status" class="status-value">已断开</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">接收数据：</span>
                        <span id="data-received" class="status-value">0 KB</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">合成进度：</span>
                        <span id="synthesis-progress" class="status-value">0%</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">当前音色：</span>
                        <span id="current-voice" class="status-value">未选择</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">播放状态：</span>
                        <span id="playback-status" class="status-value">未播放</span>
                    </div>
                </div>
            </div>

            <div class="progress-section">
                <h3><i class="fas fa-chart-line"></i> 播放进度</h3>
                <div class="progress-container">
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <div class="progress-info">
                        <span id="current-time">00:00</span>
                        <span id="duration">00:00</span>
                    </div>
                </div>
                <div class="playback-controls">
                    <button id="rewind-btn" class="playback-btn" disabled>
                        <i class="fas fa-step-backward"></i> 回退5秒
                    </button>
                    <button id="forward-btn" class="playback-btn" disabled>
                        <i class="fas fa-step-forward"></i> 前进5秒
                    </button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="voice-section">
                <h3><i class="fas fa-robot"></i> 选择音色</h3>
                <select id="voice-select" class="voice-select">
                    <option value="longanyang">龙安洋</option>
                    <option value="longhuhu_v3">龙呼呼</option>
                    <option value="longjiayi_v3">龙嘉怡</option>
                </select>

                <div id="voice-info" class="voice-info">
                    <h4>龙安洋</h4>
                    <p>阳光大男孩</p>
                </div>
            </div>

            <div class="history-section">
                <h3><i class="fas fa-history"></i> 历史记录</h3>
                <div id="history-list" class="history-list">
                    <div class="history-empty">暂无历史记录</div>
                </div>
            </div>
        </div>

        <footer>
            <div>流式语音合成客户端 | 支持合成中播放</div>
            <div class="footer-info">
                <span><i class="fas fa-microphone"></i> 阿里云 CosyVoice</span>
                <span><i class="fas fa-bolt"></i> 实时流式播放</span>
            </div>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 获取DOM元素
            const textInput = document.getElementById('text-input');
            const synthesizeBtn = document.getElementById('synthesize-btn');
            const playBtn = document.getElementById('play-btn');
            const pauseBtn = document.getElementById('pause-btn');
            const stopBtn = document.getElementById('stop-btn');
            const rewindBtn = document.getElementById('rewind-btn');
            const forwardBtn = document.getElementById('forward-btn');
            const connectionStatus = document.getElementById('connection-status');
            const dataReceived = document.getElementById('data-received');
            const synthesisProgress = document.getElementById('synthesis-progress');
            const currentVoice = document.getElementById('current-voice');
            const playbackStatus = document.getElementById('playback-status');
            const historyList = document.getElementById('history-list');
            const voiceSelect = document.getElementById('voice-select');
            const voiceInfo = document.getElementById('voice-info');
            const progressFill = document.getElementById('progress-fill');
            const currentTime = document.getElementById('current-time');
            const duration = document.getElementById('duration');

            // 音色描述信息
            const voiceDescriptions = {
                'longanyang': {
                    name: '龙安洋',
                    description: '阳光大男孩'
                },
                'longhuhu_v3': {
                    name: '龙呼呼',
                    description: '天真烂漫女童'
                },
                'longjiayi_v3': {
                    name: '龙嘉怡',
                    description: '知性粤语女'
                }
            };


            // 更新音色信息显示
            function updateVoiceInfo() {
                const voiceId = voiceSelect.value;
                const voice = voiceDescriptions[voiceId];

                if (voice) {
                    voiceInfo.innerHTML = `
                        <h4>${voice.name}</h4>
                        <p>${voice.description}</p>
                    `;

                    currentVoice.textContent = voice.name;
                }
            }

            // 状态变量
            let socket = null;
            let receivedBytes = 0;
            let history = JSON.parse(localStorage.getItem('ttsHistory') || '[]');
            let mediaSource = null;
            let sourceBuffer = null;
            let audioElement = null;
            let isSynthesizing = false;
            let isPlaying = false;
            let audioQueue = [];
            let playbackInterval = null;
            let userStopped = false; // 用户是否手动停止了播放
            let isSourceBufferUpdating = false; // sourceBuffer 是否正在更新

            // 初始化流式播放
            function initStreamPlayer() {
                // 清理旧的资源
                resetStreamPlayer();

                if (MediaSource && MediaSource.isTypeSupported('audio/mpeg')) {
                    try {
                        mediaSource = new MediaSource();
                        const audioUrl = URL.createObjectURL(mediaSource);
                        audioElement = new Audio(audioUrl);

                        mediaSource.addEventListener('sourceopen', () => {
                            try {
                                sourceBuffer = mediaSource.addSourceBuffer('audio/mpeg');
                                sourceBuffer.mode = 'sequence'; // 确保正确的顺序
                                sourceBuffer.addEventListener('updateend', () => {
                                    isSourceBufferUpdating = false;
                                    processAudioQueue();
                                });

                                sourceBuffer.addEventListener('error', (e) => {
                                    console.error('SourceBuffer error:', e);
                                    isSourceBufferUpdating = false;
                                });

                                // 处理队列中已有的音频片段
                                processAudioQueue();
                            } catch (e) {
                                console.error('创建SourceBuffer失败:', e);
                                handleError('创建播放器失败');
                            }
                        });

                        mediaSource.addEventListener('error', (e) => {
                            console.error('MediaSource error:', e);
                            handleError('媒体源错误');
                        });

                        // 音频播放事件
                        audioElement.addEventListener('play', () => {
                            isPlaying = true;
                            document.querySelector('.wave').style.opacity = '1';
                            playbackStatus.textContent = '播放中';
                            playbackStatus.style.color = '#50fa7b';
                            playBtn.disabled = true;
                            pauseBtn.disabled = false;
                            stopBtn.disabled = false;
                            rewindBtn.disabled = false;
                            forwardBtn.disabled = false;

                            // 开始更新进度
                            startProgressUpdate();
                        });

                        audioElement.addEventListener('pause', () => {
                            isPlaying = false;
                            document.querySelector('.wave').style.opacity = '0.5';
                            playbackStatus.textContent = '已暂停';
                            playbackStatus.style.color = '#ffb86c';
                            playBtn.disabled = false;
                            pauseBtn.disabled = true;

                            // 停止进度更新
                            stopProgressUpdate();
                        });

                        audioElement.addEventListener('ended', () => {
                            isPlaying = false;
                            playbackStatus.textContent = '播放结束';
                            playbackStatus.style.color = '#ffb86c';
                            playBtn.disabled = false;
                            pauseBtn.disabled = true;
                            stopBtn.disabled = true;
                            document.querySelector('.wave').style.opacity = '0.5';

                            // 停止进度更新
                            stopProgressUpdate();
                        });

                        audioElement.addEventListener('error', (e) => {
                            console.error('音频播放错误:', e);
                            handleError('播放错误: ' + e.message);
                        });
                    } catch (e) {
                        console.error('初始化播放器失败:', e);
                        handleError('初始化播放器失败');
                    }
                } else {
                    console.error('MediaSource API不受支持或MP3格式不支持');
                    handleError('您的浏览器不支持流式播放功能');
                }
            }

            // 开始更新进度
            function startProgressUpdate() {
                stopProgressUpdate(); // 确保没有重复的计时器
                playbackInterval = setInterval(updatePlaybackProgress, 200);
            }

            // 停止更新进度
            function stopProgressUpdate() {
                if (playbackInterval) {
                    clearInterval(playbackInterval);
                    playbackInterval = null;
                }
            }

            // 更新播放进度
            function updatePlaybackProgress() {
                if (!audioElement || !isPlaying) return;

                try {
                    const current = audioElement.currentTime;
                    const total = isFinite(audioElement.duration) ? audioElement.duration : 0;

                    // 更新进度显示
                    if (total > 0) {
                        const progress = (current / total) * 100;
                        progressFill.style.width = `${progress}%`;

                        // 更新时间显示
                        currentTime.textContent = formatTime(current);
                        duration.textContent = formatTime(total);
                    } else {
                        currentTime.textContent = '00:00';
                        duration.textContent = '00:00';
                    }
                } catch (e) {
                    console.error('更新播放进度失败:', e);
                }
            }

            // 格式化时间 (秒 -> MM:SS)
            function formatTime(seconds) {
                const min = Math.floor(seconds / 60);
                const sec = Math.floor(seconds % 60);
                return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
            }

            // 处理错误
            function handleError(message) {
                console.error(message);
                connectionStatus.textContent = '错误';
                connectionStatus.style.color = '#ff5555';
                playbackStatus.textContent = message;
                playbackStatus.style.color = '#ff5555';
                synthesizeBtn.disabled = false;
            }

            // 初始化历史记录
            function initHistory() {
                if (history.length === 0) {
                    historyList.innerHTML = '<div class="history-empty">暂无历史记录</div>';
                    return;
                }

                historyList.innerHTML = '';
                // 只显示最近10条历史记录
                const recentHistory = history.slice(-10).reverse();

                recentHistory.forEach((item) => {
                    const historyItem = document.createElement('div');
                    historyItem.className = 'history-item';

                    const timestamp = new Date(item.timestamp).toLocaleString();
                    const voiceName = voiceDescriptions[item.voice]?.name || item.voice;

                    historyItem.innerHTML = `
                        <div class="history-text">${item.text}</div>
                        <div class="history-meta">
                            <span>${voiceName}</span>
                            <span>${timestamp}</span>
                        </div>
                        <button class="history-delete" data-id="${item.id}">
                            <i class="fas fa-times"></i>
                        </button>
                    `;

                    historyItem.addEventListener('click', (e) => {
                        // 确保点击的不是删除按钮
                        if (!e.target.closest('.history-delete')) {
                            textInput.value = item.text;
                            voiceSelect.value = item.voice;
                            updateVoiceInfo();
                        }
                    });

                    historyList.appendChild(historyItem);
                });

                // 添加删除事件
                document.querySelectorAll('.history-delete').forEach(button => {
                    button.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = button.getAttribute('data-id');
                        deleteHistoryItem(id);
                    });
                });
            }

            // 删除历史记录项
            function deleteHistoryItem(id) {
                history = history.filter(item => item.id !== id);
                localStorage.setItem('ttsHistory', JSON.stringify(history));
                initHistory();
            }

            // 添加历史记录
            function addHistoryItem(text, voice) {
                const historyItem = {
                    id: Date.now().toString(),
                    text: text,
                    voice: voice,
                    timestamp: new Date().toISOString()
                };

                history.push(historyItem);
                localStorage.setItem('ttsHistory', JSON.stringify(history));
                initHistory();
            }

            // 播放音频
            function playAudio() {
                if (!audioElement) return;

                try {
                    if (!isPlaying) {
                        audioElement.play()
                            .then(() => {
                                userStopped = false;
                            })
                            .catch(e => {
                                console.error('播放失败:', e);
                                handleError('播放失败: ' + e.message);
                            });
                    }
                } catch (e) {
                    console.error('播放音频出错:', e);
                    handleError('播放出错');
                }
            }

            // 暂停播放
            function pauseAudio() {
                if (audioElement && isPlaying) {
                    try {
                        audioElement.pause();
                    } catch (e) {
                        console.error('暂停播放失败:', e);
                    }
                }
            }

            // 停止播放
            function stopAudio() {
                if (!audioElement) return;

                try {
                    audioElement.pause();
                    audioElement.currentTime = 0;
                    isPlaying = false;
                    userStopped = true;
                    playbackStatus.textContent = '已停止';
                    playbackStatus.style.color = '#ffb86c';
                    playBtn.disabled = false;
                    pauseBtn.disabled = true;
                    stopBtn.disabled = true;
                    rewindBtn.disabled = true;
                    forwardBtn.disabled = true;
                    document.querySelector('.wave').style.opacity = '0.5';
                    progressFill.style.width = '0%';
                    currentTime.textContent = '00:00';
                    duration.textContent = '00:00';

                    stopProgressUpdate();
                } catch (e) {
                    console.error('停止播放失败:', e);
                }
            }

            // 回退5秒
            rewindBtn.addEventListener('click', () => {
                if (audioElement) {
                    try {
                        audioElement.currentTime = Math.max(0, audioElement.currentTime - 5);
                    } catch (e) {
                        console.error('回退失败:', e);
                    }
                }
            });

            // 前进5秒
            forwardBtn.addEventListener('click', () => {
                if (audioElement && isFinite(audioElement.duration)) {
                    try {
                        audioElement.currentTime = Math.min(audioElement.duration, audioElement.currentTime + 5);
                    } catch (e) {
                        console.error('前进失败:', e);
                    }
                }
            });

            // 重置流式播放器
            function resetStreamPlayer() {
                // 清理之前的资源
                stopProgressUpdate();

                if (mediaSource) {
                    try {
                        if (mediaSource.readyState === 'open') {
                            mediaSource.endOfStream();
                        }
                        URL.revokeObjectURL(audioElement ? audioElement.src : '');
                    } catch (e) {
                        console.error('重置播放器失败:', e);
                    }
                }

                // 重置状态
                mediaSource = null;
                sourceBuffer = null;
                audioElement = null;
                audioQueue = [];
                isSourceBufferUpdating = false;
            }

            // 处理音频队列
            function processAudioQueue() {
                if (!sourceBuffer || isSourceBufferUpdating || audioQueue.length === 0) {
                    return;
                }

                try {
                    isSourceBufferUpdating = true;
                    const chunk = audioQueue.shift();
                    sourceBuffer.appendBuffer(chunk);

                    // 如果有更多数据，继续处理
                    if (audioQueue.length > 0) {
                        processAudioQueue();
                    }
                } catch (e) {
                    console.error('添加缓冲区时出错:', e);
                    isSourceBufferUpdating = false;
                }
            }

            // 连接到Socket.IO服务器
            function connectToServer() {
                if (socket) {
                    try {
                        socket.disconnect();
                    } catch (e) {
                        console.error('断开连接失败:', e);
                    }
                }

                // 连接到服务器
                socket = io();

                // 更新连接状态
                connectionStatus.textContent = '连接中...';
                connectionStatus.style.color = '#ffb86c';

                // 连接成功
                socket.on('connect', () => {
                    connectionStatus.textContent = '已连接';
                    connectionStatus.style.color = '#50fa7b';
                });

                // 连接断开
                socket.on('disconnect', () => {
                    connectionStatus.textContent = '已断开';
                    connectionStatus.style.color = '#ff5555';
                });

                // 连接错误
                socket.on('connect_error', (error) => {
                    console.error('连接错误:', error);
                    connectionStatus.textContent = '连接失败';
                    connectionStatus.style.color = '#ff5555';
                    synthesizeBtn.disabled = false;
                });

                // 接收音频开始事件
                socket.on('audio_start', () => {
                    connectionStatus.textContent = '合成中...';
                    connectionStatus.style.color = '#ffb86c';
                    isSynthesizing = true;
                    playbackStatus.textContent = '准备中';
                    playbackStatus.style.color = '#ffb86c';

                    // 启用播放按钮
                    playBtn.disabled = false;
                });

                // 接收音频片段
                socket.on('audio_chunk', (data) => {
                    try {
                        const chunk = data.data;

                        // 确保chunk是ArrayBuffer
                        let buffer;
                        if (chunk instanceof ArrayBuffer) {
                            buffer = chunk;
                        } else if (chunk instanceof Blob) {
                            // 如果收到的是Blob，转换为ArrayBuffer
                            const reader = new FileReader();
                            reader.onload = function () {
                                processAudioChunk(reader.result);
                            };
                            reader.readAsArrayBuffer(chunk);
                            return;
                        } else {
                            console.error('未知的块类型:', typeof chunk);
                            return;
                        }

                        processAudioChunk(buffer);
                    } catch (e) {
                        console.error('处理音频片段失败:', e);
                    }
                });

                // 接收音频结束事件
                socket.on('audio_end', () => {
                    isSynthesizing = false;
                    synthesisProgress.textContent = '100%';
                    connectionStatus.textContent = '合成完成';
                    connectionStatus.style.color = '#50fa7b';
                    synthesizeBtn.disabled = false;

                    if (!userStopped && !isPlaying) {
                        playAudio();
                    }

                    addHistoryItem(textInput.value, voiceSelect.value);

                    // 通知MediaSource数据已结束
                    if (mediaSource && mediaSource.readyState === 'open') {
                        try {
                            mediaSource.endOfStream();
                        } catch (e) {
                            console.error('结束流失败:', e);
                        }
                    }
                });

                // 处理合成错误
                socket.on('synthesis_error', (data) => {
                    console.error('合成错误:', data.message);
                    handleError('合成错误: ' + data.message);
                });
            }

            // 处理音频片段
            function processAudioChunk(buffer) {
                try {
                    if (!buffer) return;

                    receivedBytes += buffer.byteLength;

                    // 更新UI
                    dataReceived.textContent = `${(receivedBytes / 1024).toFixed(2)} KB`;

                    // 计算并显示进度
                    // const textLength = textInput.value.length;
                    // const progress = textLength > 0 ?
                    //     Math.min(100, Math.round((receivedBytes / (textLength * 50)) * 100)) :
                    //     0;
                    // synthesisProgress.textContent = `${progress}%`;
                    synthesisProgress.textContent = '20%';

                    // 添加到音频队列
                    audioQueue.push(buffer);

                    // 处理音频队列
                    processAudioQueue();

                    // 如果没有播放且用户没有主动停止，尝试播放
                    if (!isPlaying && !userStopped) {
                        playAudio();
                    }
                } catch (e) {
                    console.error('处理音频片段失败:', e);
                }
            }

            // 合成语音按钮事件
            synthesizeBtn.addEventListener('click', () => {
                const text = textInput.value.trim();
                const voice = voiceSelect.value;

                if (!text) {
                    alert('请输入要转换的文本内容');
                    return;
                }

                if (!voice) {
                    alert('请选择音色');
                    return;
                }

                // 重置状态
                receivedBytes = 0;
                dataReceived.textContent = '0 KB';
                synthesisProgress.textContent = '0%';
                synthesizeBtn.disabled = true;
                playBtn.disabled = true;
                pauseBtn.disabled = true;
                stopBtn.disabled = true;
                rewindBtn.disabled = true;
                forwardBtn.disabled = true;

                // 更新状态
                connectionStatus.textContent = '开始连接...';
                connectionStatus.style.color = '#ffb86c';
                currentVoice.textContent = voiceDescriptions[voice].name || voice;
                playbackStatus.textContent = '准备中';
                playbackStatus.style.color = '#ffb86c';

                // 重置用户停止状态
                userStopped = false;

                // 重置播放器
                try {
                    initStreamPlayer();
                } catch (e) {
                    console.error('初始化播放器失败:', e);
                    handleError('初始化播放器失败');
                    synthesizeBtn.disabled = false;
                    return;
                }

                // 发送合成请求 (通过Socket.IO)
                try {
                    socket.emit('synthesize', {
                        input: text,
                        voice: voice
                    });
                } catch (e) {
                    console.error('发送合成请求失败:', e);
                    handleError('发送请求失败');
                    synthesizeBtn.disabled = false;
                }
            });

            // 播放按钮事件
            playBtn.addEventListener('click', () => {
                playAudio();
            });

            // 暂停按钮事件
            pauseBtn.addEventListener('click', () => {
                pauseAudio();
            });

            // 停止按钮事件
            stopBtn.addEventListener('click', () => {
                stopAudio();
            });

            // 初始化
            initHistory();
            updateVoiceInfo();
            connectToServer();

            // 监听音色选择变化
            voiceSelect.addEventListener('change', updateVoiceInfo);
        });
    </script>
</body>

</html>
